<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<!-- Faça um algoritmo que calcule 
 e escreva a média aritmética dos 
 números inteiros entre 15 
 (inclusive) e 100 (inclusive).-->

<body>

    <script>

        let soma = 0;
        let contador = 0;

        for (let i = 15; i <= 100; i++) {
            soma += i;
            contador++;
        }

        let media = soma / contador;

        document.write("A média aritmética dos números de 15 até 100 é: " + media);





    </script>




</body>

</html>
