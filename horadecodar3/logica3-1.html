<!-- Crie uma bomba relógio (usando somente código -
  para deixar claro!) cuja contagem regressiva 
 vá de 30 a 0. No final da 
 repetição escreva "EXPLOSÃO".-->

<body>
    <script>

        for(let i = 30; i >=0; i--){
            console.log (i);
        }
        console.log("Explosão");

        
    </script>




</body>
