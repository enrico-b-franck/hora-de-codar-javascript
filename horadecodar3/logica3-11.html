<!-- Escreva um programa para imprimir todas as tabuadas de 1 a N. N será informado pelo usuário.-->


<body>

    <script>



        let N = parseInt(prompt("Digite um valor maior que 0"));

        while (N <= 0 || isNaN(N)) {
            alert("Por favor, digite um número válido maior que 0");
            N = parseInt(prompt("Digite um valor maior que 0"));
        }

        for (let i = 1; i <= N; i++) {
            console.log("Tabuada do " + i + ":");
            for (let j = 1; j <= 10; j++) {
                console.log(i + " x " + j + " = " + (i * j));
            }
            console.log("-------------------");
        }

    </script>


</body>

</html>
