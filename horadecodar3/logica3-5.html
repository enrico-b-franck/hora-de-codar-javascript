<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

<!-- Faça um algoritmo que calcule e
  escreva a média aritmética dos
 dois números inteiros informados 
 pelo usuário e todos os 
 números inteiros entre eles. 
 Considere que o primeiro sempre 
 será menor que o segundo.-->


<body>


    <script>

        let number1 = Number(prompt("Insira um numero"))
        let number2 = Number(prompt("Insira um novo numero"))
        let soma = 0;
        let contador = 0;

        for (let i = number1; i <= number2; i++) {
            soma += i;
            contador++;
        }

        let media = soma / contador;

        document.write("A média aritmética dos números entre " + number1 + " e " + number2 + " é: " + media);


    </script>



</body>

</html>
