<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    <!--Escreva um algoritmo 
    para ler 2 valores informados
     pelo usuário e enquanto o segundo
      valor informado for igual ou 
      menor que ZERO, deve ser lido 
      um novo valor, mas para a mesma
       variável. Ou seja, para o 
       segundo valor não pode ser 
       aceito o valor zero nem um
        valor negativo. 

O seu programa deve imprimir o resultado da divisão
 do primeiro valor lido pelo 
 segundo valor e exibir o
 resultado ao usuário.-->
    <script>

        let valor1 = Number(prompt("Insira um valor"))
        let valor2 = Number(prompt("Insira um segundo valor"))

        while (valor2 <= 0){
            valor2 = parseInt(prompt("Valor inválido! Digite um novo segundo valor "))
        
        }
     
            alert("O resultado da divisão desses dois valores é " + valor1 / valor2)
    </script>



</body>
</html>
