<!-- Ler um valor N e imprimir todos os valores inteiros entre 1 (inclusive) e N (inclusive). Considere que o N será sempre maior que ZERO.
N  é um valor informado pelo usuário-->


<body>

    <script>

        let N = parseInt(prompt("Digite um valor maior que 0"));

        while (N <= 0 || isNaN(N)) {
            alert("Por favor, digite um número válido maior que 0");
            N = parseInt(prompt("Digite um valor maior que 0"));
        }

        for (let i = 1; i <= N; i++) {
            console.log(i);
  
        }
    </script>





</body>
