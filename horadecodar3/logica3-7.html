<!--Escreva um algoritmo para ler as notas de avaliações de um aluno, calcule e imprima a média
 (simples) desse aluno. Só devem ser aceitos valores válidos durante a leitura (0 a 10) para cada nota. 
 São 6 notas ao total.
Caso o valor informado para qualquer uma das notas esteja fora do limite 
estabelecido, deve ser solicitado um novo valor ao usuário.-->

<body>

    <script>



        let notas = 0;

        for (let i = 1; i <= 6; i++) {
            let nota = parseFloat(prompt("Digite a nota " + i + " do aluno (0 a 10)"));

            while (nota < 0 || nota > 10 || isNaN(nota)) {
                alert("Por favor, digite uma nota válida");
                nota = parseFloat(prompt("Digite a nota " + i + " do aluno (0 a 10)"));
            }

            notas += nota;
        }

        let media = notas / 6;
        alert("A média do aluno é " + media.toFixed(2));



        // alert("Sua média é " + )



    </script>


</body>

</html>
