<!--Escreva um programa que calcule a média de quatro números informados pelo usuário, 
 mas somente se esses números forem maiores que 0 e menores que 10. 
 No final, se a média for maior que cinco o usuário receberá uma mensagem 
 "Você passou no teste". Em qualquer outra situação,ele receberá uma mensagem de "tente novamente"!-->

<body>


    <script>


        let soma = 0;

        for (let i = 0; i < 4; i++) {
            let numero = parseFloat(prompt("Digite um número entre 0 e 10:"));

            if (numero > 0 && numero < 10) {
                soma = soma + numero; 
            } else {
                alert("Número inválido! Digite apenas valores maiores que 0 e menores que 10.");
                i--; 
            }
        }

        let media = soma / 4; 

        if (media > 5) {
            alert("Você passou no teste");
        } else {
            alert("Tente novamente");
        }







    </script>


</body>

</html>
