<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- Escreva um programa para ler o ano de nascimento de uma pessoa e escrever uma 
     mensagem que diga se ela poderá ou não votar este ano 
     (não é necessário considerar o mês em que ela nasceu).-->
    <script>

        let DatadeNacimento = parseInt(prompt("Informe seu ano de nascimento"))

        if (DatadeNacimento < 2009) {
            alert("Você é maior de idade e pode votar");
        }

        else {
            alert("Você não pode votar");
        }
        





    </script>



</body>

</html>
