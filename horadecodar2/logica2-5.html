<!-- Faça um programa que leia 6 valores informados pelo usuário, calcule, exiba os números 
 informados e escreva a média aritmética
  desses valores lidos.-->

<body>

    <script>

        let valores = [];
        let soma = 0;


        for (let i = 0; i < 6; i++) {
            let numero = parseFloat(prompt("Digite um valor"));
            valores.push(numero);
            soma += numero;
        }
        let media = soma / 6;

        alert("A média desses valores são " + media);




    </script>



</body>

</html>
