<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>


        let numeros = [];   // array para guardar os valores
        let soma = 0;       // variável para acumular a soma

        // Loop para ler 6 valores
        for (let i = 1; i <= 6; i++) {
            let valor = parseFloat(prompt("Digite o " + i + "º número:"));
            numeros.push(valor); // guarda o número no array

            // Se for menor que 72, soma
            if (valor < 72) {
                soma += valor;
            }
        }

        // Exibir resultados
        alert("Valores informados: " + numeros.join(", "));
        alert("Soma dos valores menores que 72: " + soma);



    </script>



</body>

</html>
