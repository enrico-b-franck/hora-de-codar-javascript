<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <!--Faça um programa que receba quatro valores informados pelo usuário, mas informe somente o primeiro, o último e o maior de todos eles (considere que todos os números informados serão diferentes)-->

    <script>


        let numeros = [];


        for (let i = 1; i <= 4; i++) {
            let valor = parseFloat(prompt("Digite o " + i + "º número:"));
            numeros.push(valor);
        }

        let maior = numeros[0];
        for (let i = 1; i < numeros.length; i++) {
            if (numeros[i] > maior) {
                maior = numeros[i];
            }
        }

        alert("Primeiro valor informado: " + numeros[0]);
        alert("Último valor informado: " + numeros[numeros.length - 1]);
        alert("Maior valor informado: " + maior);

    </script>


</body>

</html>
