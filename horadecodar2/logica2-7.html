<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

    let numeros = [];   
        let soma = 0;       


        for (let i = 1; i <= 6; i++) {
            let valor = parseFloat(prompt("Digite o " + i + "º número:"));
            numeros.push(valor); 

            if (valor < 72) {
                soma += valor;
            }
        }


        alert("Valores informados: " + numeros.join(", "));
        alert("Soma dos valores menores que 72: " + soma);


    </script>



</body>
</html>
