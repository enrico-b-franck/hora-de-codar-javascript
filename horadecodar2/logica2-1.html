<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    
    <!--1. Escreva um programa em que o usuário informe dois números. Então escreva em tela o maior deles.--> 
    <script>

        var numero1 = prompt("Digite um número");
        var numero2 = prompt("Digite um segundo número");

        if (numero1 > numero2) {alert("O maior valor é  " + numero1 )}

        else if (numero1 < numero2) {alert("O maior valor é  " + numero2 )}




    </script>


</body>
</html>
