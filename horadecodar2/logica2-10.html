<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>


    <!--Tendo como entrada a altura e o gênero designado ao nascer (codificado da seguinte forma: 1: feminino - 2: masculino - ) de uma pessoa, 
    construa um programa que calcule e imprima seu peso ideal, 
    utilizando as seguintes fórmulas.-->


    <script>
        
        let altura = parseFloat(prompt("Informe sua altura em metros (ex: 1.70):"));
        let genero = parseInt(prompt("Informe seu gênero designado ao nascer (1: feminino, 2: masculino):"));

        let pesoIdeal;

        switch (genero) {
            case 1: // feminino
                pesoIdeal = (62.1 * altura) - 44.7;
                alert("Seu peso ideal é: " + pesoIdeal.toFixed(2) + " kg");
                break;

            case 2: // masculino
                pesoIdeal = (72.7 * altura) - 58;
                alert("Seu peso ideal é: " + pesoIdeal.toFixed(2) + " kg");
                break;

            default: // qualquer outro código
                alert("Código inválido. Digite 1 para feminino ou 2 para masculino.");
                break;
        }


    </script>


</body>

</html>
